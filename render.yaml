services:
  - type: web
    name: groweasy-backend
    runtime: node
    rootDir: backend
    plan: free
    buildCommand: npm install
    startCommand: node src/index.js
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_MODEL
        value: openai/gpt-oss-120b
      - key: AI_BATCH_SIZE
        value: "25"
      - key: AI_CONCURRENCY
        value: "3"
      - key: AI_MAX_RETRIES
        value: "3"
      - key: MAX_FILE_SIZE_MB
        value: "5"
      - key: FRONTEND_ORIGIN
        sync: false

  - type: web
    name: groweasy-frontend
    runtime: node
    rootDir: frontend
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NEXT_PUBLIC_API_URL
        sync: false
